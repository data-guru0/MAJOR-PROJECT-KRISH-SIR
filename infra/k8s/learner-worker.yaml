apiVersion: apps/v1
kind: Deployment
metadata:
  name: learner-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: learner-worker
  template:
    metadata:
      labels:
        app: learner-worker
    spec:
      containers:
        - name: learner-worker
          image: IMAGE_TAG
          command: ["celery", "-A", "worker", "worker", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["celery", "-A", "worker", "inspect", "ping"]
            initialDelaySeconds: 30
            periodSeconds: 60
