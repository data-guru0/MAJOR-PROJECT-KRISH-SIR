name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Test gateway
        working-directory: services/gateway
        run: |
          pip install -r requirements.txt
          if [ -d tests ]; then pytest; fi

      - name: Test webhook
        working-directory: services/webhook
        run: |
          pip install -r requirements.txt
          if [ -d tests ]; then pytest; fi

      - name: Test orchestrator
        working-directory: services/orchestrator
        run: |
          pip install -r requirements.txt
          if [ -d tests ]; then pytest; fi

      - name: Test reviewer
        working-directory: services/reviewer
        run: |
          pip install -r requirements.txt
          if [ -d tests ]; then pytest; fi

      - name: Test learner
        working-directory: services/learner
        run: |
          pip install -r requirements.txt
          if [ -d tests ]; then pytest; fi

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push gateway
        run: |
          docker build -t $ECR_REGISTRY/gateway:$GITHUB_SHA ./services/gateway
          docker push $ECR_REGISTRY/gateway:$GITHUB_SHA

      - name: Build and push webhook
        run: |
          docker build -t $ECR_REGISTRY/webhook:$GITHUB_SHA ./services/webhook
          docker push $ECR_REGISTRY/webhook:$GITHUB_SHA

      - name: Build and push orchestrator
        run: |
          docker build -t $ECR_REGISTRY/orchestrator:$GITHUB_SHA ./services/orchestrator
          docker push $ECR_REGISTRY/orchestrator:$GITHUB_SHA

      - name: Build and push reviewer
        run: |
          docker build -t $ECR_REGISTRY/reviewer:$GITHUB_SHA ./services/reviewer
          docker push $ECR_REGISTRY/reviewer:$GITHUB_SHA

      - name: Build and push learner
        run: |
          docker build -t $ECR_REGISTRY/learner:$GITHUB_SHA ./services/learner
          docker push $ECR_REGISTRY/learner:$GITHUB_SHA

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region us-east-1

      - name: Deploy gateway
        run: kubectl set image deployment/gateway gateway=$ECR_REGISTRY/gateway:$GITHUB_SHA

      - name: Deploy webhook
        run: kubectl set image deployment/webhook webhook=$ECR_REGISTRY/webhook:$GITHUB_SHA

      - name: Deploy orchestrator
        run: kubectl set image deployment/orchestrator orchestrator=$ECR_REGISTRY/orchestrator:$GITHUB_SHA

      - name: Deploy reviewer
        run: kubectl set image deployment/reviewer reviewer=$ECR_REGISTRY/reviewer:$GITHUB_SHA

      - name: Deploy learner
        run: kubectl set image deployment/learner learner=$ECR_REGISTRY/learner:$GITHUB_SHA
